name: Steam Hardware Stock Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check stock for all items
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 check-stock.py
